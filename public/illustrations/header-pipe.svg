<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Engine block (simplified, left side) -->
  <rect x="20" y="50" width="60" height="80" rx="3" fill="none" stroke="#333333" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="50" y="95" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#999">Engine</text>
  <!-- Exhaust port flange -->
  <rect x="76" y="75" width="12" height="30" rx="2" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Flange bolts -->
  <circle cx="82" cy="80" r="3" fill="none" stroke="#333333" stroke-width="1"/>
  <circle cx="82" cy="100" r="3" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Header pipe - curved section -->
  <path d="M88,78 Q120,78 140,85 Q170,95 190,110 Q220,130 250,135 L280,135" fill="none" stroke="#333333" stroke-width="2.5"/>
  <path d="M88,102 Q120,102 140,106 Q170,113 190,125 Q220,143 250,147 L280,147" fill="none" stroke="#333333" stroke-width="2.5"/>
  <!-- Pipe cross-section circle at end -->
  <ellipse cx="280" cy="141" rx="4" ry="6" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Heat discoloration zones (subtle marking) -->
  <line x1="100" y1="82" x2="100" y2="98" stroke="#999" stroke-width="0.5" stroke-dasharray="1,2"/>
  <line x1="130" y1="88" x2="130" y2="104" stroke="#999" stroke-width="0.5" stroke-dasharray="1,2"/>
  <line x1="160" y1="98" x2="160" y2="112" stroke="#999" stroke-width="0.5" stroke-dasharray="1,2"/>
  <!-- O2 sensor bung -->
  <circle cx="170" cy="105" r="5" fill="none" stroke="#333333" stroke-width="1.5"/>
  <line x1="170" y1="100" x2="170" y2="88" stroke="#333333" stroke-width="1.5"/>
  <!-- Collector (if multi-cylinder hint) -->
  <path d="M88,65 Q110,65 130,75 Q155,88 170,95" fill="none" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Callouts -->
  <line x1="82" y1="107" x2="82" y2="140" stroke="#999" stroke-width="0.8"/>
  <text x="82" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Flange</text>
  <line x1="170" y1="88" x2="170" y2="65" stroke="#999" stroke-width="0.8"/>
  <text x="170" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">O2 sensor bung</text>
  <line x1="260" y1="135" x2="260" y2="115" stroke="#999" stroke-width="0.8"/>
  <text x="260" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">To muffler</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Exhaust Header Pipe</text>
</svg>