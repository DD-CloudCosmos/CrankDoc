<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Radiator frame (front view) -->
  <rect x="60" y="25" width="180" height="140" rx="4" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Top tank -->
  <rect x="60" y="25" width="180" height="20" rx="4" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Bottom tank -->
  <rect x="60" y="145" width="180" height="20" rx="4" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Cooling fin rows (vertical lines) -->
  <line x1="80" y1="45" x2="80" y2="145" stroke="#333333" stroke-width="0.8"/>
  <line x1="95" y1="45" x2="95" y2="145" stroke="#333333" stroke-width="0.8"/>
  <line x1="110" y1="45" x2="110" y2="145" stroke="#333333" stroke-width="0.8"/>
  <line x1="125" y1="45" x2="125" y2="145" stroke="#333333" stroke-width="0.8"/>
  <line x1="140" y1="45" x2="140" y2="145" stroke="#333333" stroke-width="0.8"/>
  <line x1="155" y1="45" x2="155" y2="145" stroke="#333333" stroke-width="0.8"/>
  <line x1="170" y1="45" x2="170" y2="145" stroke="#333333" stroke-width="0.8"/>
  <line x1="185" y1="45" x2="185" y2="145" stroke="#333333" stroke-width="0.8"/>
  <line x1="200" y1="45" x2="200" y2="145" stroke="#333333" stroke-width="0.8"/>
  <line x1="215" y1="45" x2="215" y2="145" stroke="#333333" stroke-width="0.8"/>
  <line x1="225" y1="45" x2="225" y2="145" stroke="#333333" stroke-width="0.8"/>
  <!-- Horizontal tubes (between fins) -->
  <line x1="65" y1="65" x2="235" y2="65" stroke="#333333" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="65" y1="85" x2="235" y2="85" stroke="#333333" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="65" y1="105" x2="235" y2="105" stroke="#333333" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="65" y1="125" x2="235" y2="125" stroke="#333333" stroke-width="0.5" stroke-dasharray="2,3"/>
  <!-- Inlet hose connection (top right) -->
  <circle cx="220" cy="35" r="8" fill="none" stroke="#333333" stroke-width="1.5"/>
  <line x1="228" y1="35" x2="260" y2="25" stroke="#333333" stroke-width="1.5"/>
  <!-- Outlet hose connection (bottom left) -->
  <circle cx="80" cy="155" r="8" fill="none" stroke="#333333" stroke-width="1.5"/>
  <line x1="72" y1="155" x2="40" y2="165" stroke="#333333" stroke-width="1.5"/>
  <!-- Filler cap -->
  <rect x="130" y="18" width="20" height="10" rx="3" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Mounting brackets -->
  <rect x="55" y="80" width="8" height="20" rx="2" fill="none" stroke="#333333" stroke-width="1"/>
  <rect x="237" y="80" width="8" height="20" rx="2" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Callouts -->
  <line x1="260" y1="25" x2="272" y2="18" stroke="#999" stroke-width="0.8"/>
  <text x="274" y="18" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">Inlet</text>
  <line x1="40" y1="165" x2="28" y2="172" stroke="#999" stroke-width="0.8"/>
  <text x="26" y="178" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">Outlet</text>
  <line x1="140" y1="18" x2="140" y2="10" stroke="#999" stroke-width="0.8"/>
  <text x="140" y="8" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">Cap</text>
  <line x1="152" y1="95" x2="265" y2="95" stroke="#999" stroke-width="0.8"/>
  <text x="267" y="98" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Fins</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Radiator (Front View)</text>
</svg>