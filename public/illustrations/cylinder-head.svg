<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Cylinder head outer shape -->
  <path d="M50,160 L50,60 Q50,40 70,35 L230,35 Q250,40 250,60 L250,160" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Combustion chamber dome -->
  <path d="M80,160 Q150,120 220,160" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Bottom gasket surface -->
  <line x1="50" y1="160" x2="250" y2="160" stroke="#333333" stroke-width="2"/>
  <!-- Intake port -->
  <path d="M70,35 L70,15 Q70,10 80,10 L100,10 Q110,10 110,15 L110,35" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Exhaust port -->
  <path d="M190,35 L190,15 Q190,10 200,10 L220,10 Q230,10 230,15 L230,35" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Intake valve -->
  <line x1="90" y1="55" x2="90" y2="130" stroke="#333333" stroke-width="1.5"/>
  <path d="M75,130 L90,140 L105,130" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Exhaust valve -->
  <line x1="210" y1="55" x2="210" y2="125" stroke="#333333" stroke-width="1.5"/>
  <path d="M198,125 L210,133 L222,125" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Valve springs -->
  <path d="M82,55 L98,65 L82,75 L98,85 L82,95" stroke="#333333" stroke-width="1" fill="none"/>
  <path d="M202,55 L218,65 L202,75 L218,85 L202,90" stroke="#333333" stroke-width="1" fill="none"/>
  <!-- Spark plug hole -->
  <rect x="145" y="35" width="10" height="30" fill="none" stroke="#333333" stroke-width="1.5"/>
  <line x1="148" y1="65" x2="152" y2="65" stroke="#333333" stroke-width="1"/>
  <!-- Coolant passage -->
  <ellipse cx="130" cy="70" rx="8" ry="5" fill="none" stroke="#333333" stroke-width="1" stroke-dasharray="2,2"/>
  <ellipse cx="175" cy="70" rx="8" ry="5" fill="none" stroke="#333333" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Callouts -->
  <text x="90" y="12" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">Intake</text>
  <text x="210" y="12" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">Exhaust</text>
  <line x1="150" y1="38" x2="150" y2="22" stroke="#999" stroke-width="0.8"/>
  <text x="150" y="18" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">Spark plug</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Cylinder Head (Cross-Section)</text>
</svg>