<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Muffler outer shell (cross-section, side view) -->
  <rect x="50" y="45" width="200" height="90" rx="20" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Inlet pipe -->
  <line x1="15" y1="90" x2="50" y2="90" stroke="#333333" stroke-width="2"/>
  <ellipse cx="15" cy="90" rx="3" ry="6" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Outlet pipe -->
  <line x1="250" y1="90" x2="285" y2="90" stroke="#333333" stroke-width="2"/>
  <ellipse cx="285" cy="90" rx="3" ry="6" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Internal baffles -->
  <line x1="120" y1="50" x2="120" y2="120" stroke="#333333" stroke-width="1.5"/>
  <line x1="180" y1="55" x2="180" y2="125" stroke="#333333" stroke-width="1.5"/>
  <!-- Perforated inner pipe (passes through baffles) -->
  <line x1="50" y1="87" x2="250" y2="87" stroke="#333333" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="50" y1="93" x2="250" y2="93" stroke="#333333" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Perforation holes on inner pipe -->
  <circle cx="75" cy="90" r="1.5" fill="#333333"/>
  <circle cx="85" cy="90" r="1.5" fill="#333333"/>
  <circle cx="95" cy="90" r="1.5" fill="#333333"/>
  <circle cx="135" cy="90" r="1.5" fill="#333333"/>
  <circle cx="145" cy="90" r="1.5" fill="#333333"/>
  <circle cx="155" cy="90" r="1.5" fill="#333333"/>
  <circle cx="195" cy="90" r="1.5" fill="#333333"/>
  <circle cx="205" cy="90" r="1.5" fill="#333333"/>
  <circle cx="215" cy="90" r="1.5" fill="#333333"/>
  <!-- Packing material (hatched areas) -->
  <line x1="55" y1="52" x2="65" y2="62" stroke="#333333" stroke-width="0.5"/>
  <line x1="65" y1="52" x2="75" y2="62" stroke="#333333" stroke-width="0.5"/>
  <line x1="75" y1="52" x2="85" y2="62" stroke="#333333" stroke-width="0.5"/>
  <line x1="55" y1="118" x2="65" y2="128" stroke="#333333" stroke-width="0.5"/>
  <line x1="65" y1="118" x2="75" y2="128" stroke="#333333" stroke-width="0.5"/>
  <line x1="75" y1="118" x2="85" y2="128" stroke="#333333" stroke-width="0.5"/>
  <!-- Chamber labels -->
  <text x="85" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" fill="#999">1st</text>
  <text x="150" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" fill="#999">2nd</text>
  <text x="215" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" fill="#999">3rd</text>
  <!-- Baffle openings (holes in baffles) -->
  <circle cx="120" cy="75" r="4" fill="#FAFAFA" stroke="#333333" stroke-width="1"/>
  <circle cx="180" cy="105" r="4" fill="#FAFAFA" stroke="#333333" stroke-width="1"/>
  <!-- Callouts -->
  <line x1="120" y1="50" x2="120" y2="28" stroke="#999" stroke-width="0.8"/>
  <text x="120" y="22" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Baffle</text>
  <line x1="70" y1="55" x2="70" y2="28" stroke="#999" stroke-width="0.8"/>
  <text x="70" y="22" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Packing</text>
  <line x1="150" y1="93" x2="150" y2="150" stroke="#999" stroke-width="0.8"/>
  <text x="150" y="162" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Perforated core tube</text>
  <!-- Airflow arrows -->
  <path d="M20,90 L30,90" stroke="#999" stroke-width="1"/>
  <polygon points="30,87 36,90 30,93" fill="#999"/>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Muffler (Cross-Section)</text>
</svg>