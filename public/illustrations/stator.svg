<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Stator outer ring -->
  <circle cx="150" cy="95" r="75" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="150" cy="95" r="35" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Coil poles (12 poles around the stator) -->
  <!-- Top -->
  <rect x="144" y="25" width="12" height="30" rx="2" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Top-right 1 -->
  <rect x="178" y="32" width="12" height="28" rx="2" fill="none" stroke="#333333" stroke-width="1.5" transform="rotate(30, 184, 46)"/>
  <!-- Right-top -->
  <rect x="200" y="52" width="12" height="28" rx="2" fill="none" stroke="#333333" stroke-width="1.5" transform="rotate(60, 206, 66)"/>
  <!-- Right -->
  <rect x="207" y="82" width="30" height="12" rx="2" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Right-bottom -->
  <rect x="200" y="112" width="12" height="28" rx="2" fill="none" stroke="#333333" stroke-width="1.5" transform="rotate(-60, 206, 126)"/>
  <!-- Bottom-right -->
  <rect x="178" y="130" width="12" height="28" rx="2" fill="none" stroke="#333333" stroke-width="1.5" transform="rotate(-30, 184, 144)"/>
  <!-- Bottom -->
  <rect x="144" y="132" width="12" height="30" rx="2" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Bottom-left -->
  <rect x="110" y="130" width="12" height="28" rx="2" fill="none" stroke="#333333" stroke-width="1.5" transform="rotate(30, 116, 144)"/>
  <!-- Left-bottom -->
  <rect x="88" y="112" width="12" height="28" rx="2" fill="none" stroke="#333333" stroke-width="1.5" transform="rotate(60, 94, 126)"/>
  <!-- Left -->
  <rect x="60" y="82" width="30" height="12" rx="2" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Left-top -->
  <rect x="88" y="52" width="12" height="28" rx="2" fill="none" stroke="#333333" stroke-width="1.5" transform="rotate(-60, 94, 66)"/>
  <!-- Top-left -->
  <rect x="110" y="32" width="12" height="28" rx="2" fill="none" stroke="#333333" stroke-width="1.5" transform="rotate(-30, 116, 46)"/>
  <!-- Wire windings suggestion on a few poles -->
  <path d="M146,28 L156,28 L156,52 L146,52 Z" fill="none" stroke="#333333" stroke-width="0.5" stroke-dasharray="1,1"/>
  <!-- Center mounting hole -->
  <circle cx="150" cy="95" r="8" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Lead wires coming out -->
  <path d="M75,95 L40,80" stroke="#333333" stroke-width="1.5"/>
  <path d="M75,95 L40,95" stroke="#333333" stroke-width="1.5"/>
  <path d="M75,95 L40,110" stroke="#333333" stroke-width="1.5"/>
  <circle cx="37" cy="80" r="3" fill="none" stroke="#333333" stroke-width="1"/>
  <circle cx="37" cy="95" r="3" fill="none" stroke="#333333" stroke-width="1"/>
  <circle cx="37" cy="110" r="3" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Callouts -->
  <line x1="160" y1="25" x2="230" y2="15" stroke="#999" stroke-width="0.8"/>
  <text x="232" y="18" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Coil pole</text>
  <line x1="37" y1="115" x2="37" y2="135" stroke="#999" stroke-width="0.8"/>
  <text x="37" y="145" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">3-phase leads</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Stator Coil Assembly</text>
</svg>