<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Small end (wrist pin bore) -->
  <circle cx="150" cy="40" r="15" fill="none" stroke="#333333" stroke-width="2"/>
  <circle cx="150" cy="40" r="8" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Connecting rod beam (I-section) -->
  <path d="M142,55 L138,135 L130,135 L130,140 L170,140 L170,135 L162,135 L158,55" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- I-beam cross-section detail (center area) -->
  <line x1="143" y1="80" x2="157" y2="80" stroke="#333333" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="142" y1="95" x2="158" y2="95" stroke="#333333" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="141" y1="110" x2="159" y2="110" stroke="#333333" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Big end (crankpin bore) -->
  <circle cx="150" cy="155" r="28" fill="none" stroke="#333333" stroke-width="2"/>
  <circle cx="150" cy="155" r="16" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Big end cap split line -->
  <line x1="122" y1="155" x2="178" y2="155" stroke="#333333" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Cap bolts -->
  <circle cx="128" cy="165" r="4" fill="none" stroke="#333333" stroke-width="1"/>
  <circle cx="172" cy="165" r="4" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Bearing shells (inside big end) -->
  <path d="M135,145 Q150,130 165,145" fill="none" stroke="#333333" stroke-width="0.8"/>
  <path d="M135,165 Q150,180 165,165" fill="none" stroke="#333333" stroke-width="0.8"/>
  <!-- Oil hole -->
  <circle cx="150" cy="140" r="2" fill="#333333"/>
  <!-- Callouts -->
  <line x1="165" y1="40" x2="220" y2="28" stroke="#999" stroke-width="0.8"/>
  <text x="222" y="31" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Small end</text>
  <text x="222" y="43" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">(wrist pin)</text>
  <line x1="160" y1="95" x2="220" y2="85" stroke="#999" stroke-width="0.8"/>
  <text x="222" y="88" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Beam</text>
  <line x1="178" y1="155" x2="220" y2="145" stroke="#999" stroke-width="0.8"/>
  <text x="222" y="148" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Big end</text>
  <text x="222" y="160" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">(crank pin)</text>
  <line x1="128" y1="170" x2="80" y2="180" stroke="#999" stroke-width="0.8"/>
  <text x="50" y="183" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Cap bolt</text>
  <!-- Label -->
  <text x="150" y="198" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Connecting Rod</text>
</svg>