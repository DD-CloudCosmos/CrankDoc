<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Swingarm main body (left arm) -->
  <path d="M60,80 L60,100 L230,115 L230,95 Z" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Swingarm main body (right arm, offset for perspective) -->
  <path d="M60,105 L60,125 L230,140 L230,120 Z" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Cross brace -->
  <path d="M130,100 L130,125" stroke="#333333" stroke-width="1.5"/>
  <path d="M170,105 L170,130" stroke="#333333" stroke-width="1.5"/>
  <path d="M130,100 L170,105" stroke="#333333" stroke-width="1.5"/>
  <path d="M130,125 L170,130" stroke="#333333" stroke-width="1.5"/>
  <!-- Pivot point (front, near frame) -->
  <circle cx="60" cy="102" r="12" fill="none" stroke="#333333" stroke-width="2"/>
  <circle cx="60" cy="102" r="5" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Axle point (rear) -->
  <circle cx="240" cy="118" r="10" fill="none" stroke="#333333" stroke-width="2"/>
  <circle cx="240" cy="118" r="4" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Chain adjuster slots -->
  <rect x="232" y="96" width="20" height="6" rx="2" fill="none" stroke="#333333" stroke-width="1"/>
  <rect x="232" y="136" width="20" height="6" rx="2" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Shock mount -->
  <circle cx="180" cy="92" r="6" fill="none" stroke="#333333" stroke-width="1.5"/>
  <line x1="180" y1="86" x2="180" y2="60" stroke="#333333" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="180" y="55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">To shock</text>
  <!-- Chain guide groove suggestion -->
  <path d="M80,95 Q150,92 220,95" fill="none" stroke="#333333" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Callouts -->
  <line x1="60" y1="115" x2="60" y2="155" stroke="#999" stroke-width="0.8"/>
  <text x="60" y="165" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Pivot bearing</text>
  <line x1="252" y1="118" x2="275" y2="118" stroke="#999" stroke-width="0.8"/>
  <text x="277" y="115" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Rear</text>
  <text x="277" y="127" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">axle</text>
  <line x1="252" y1="99" x2="275" y2="85" stroke="#999" stroke-width="0.8"/>
  <text x="265" y="80" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Adjuster</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Swingarm</text>
</svg>