<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Valve stem -->
  <rect x="145" y="20" width="10" height="120" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Valve head (tulip shape) -->
  <path d="M115,140 L145,140 L145,155 Q130,165 115,155 Z" fill="none" stroke="#333333" stroke-width="2"/>
  <path d="M155,140 L185,140 L185,155 Q170,165 155,155 Z" fill="none" stroke="#333333" stroke-width="2"/>
  <line x1="115" y1="140" x2="185" y2="140" stroke="#333333" stroke-width="2"/>
  <path d="M115,155 Q150,175 185,155" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Valve face/seat angle -->
  <line x1="118" y1="142" x2="145" y2="153" stroke="#333333" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="182" y1="142" x2="155" y2="153" stroke="#333333" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Keeper groove -->
  <rect x="143" y="22" width="14" height="6" rx="1" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Spring retainer (top) -->
  <rect x="125" y="28" width="50" height="6" rx="2" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Valve spring -->
  <path d="M128,34 L172,44 L128,54 L172,64 L128,74 L172,84 L128,94 L172,104 L128,114" stroke="#333333" stroke-width="1.5" fill="none"/>
  <!-- Spring seat (bottom) -->
  <rect x="120" y="114" width="60" height="6" rx="2" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Callouts -->
  <line x1="175" y1="31" x2="220" y2="25" stroke="#999" stroke-width="0.8"/>
  <text x="222" y="28" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Retainer</text>
  <line x1="175" y1="74" x2="220" y2="65" stroke="#999" stroke-width="0.8"/>
  <text x="222" y="68" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Spring</text>
  <line x1="155" y1="135" x2="220" y2="130" stroke="#999" stroke-width="0.8"/>
  <text x="222" y="133" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Stem</text>
  <line x1="170" y1="160" x2="220" y2="160" stroke="#999" stroke-width="0.8"/>
  <text x="222" y="163" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Valve head</text>
  <!-- Label -->
  <text x="150" y="192" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Valve with Spring Assembly</text>
</svg>