<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Reservoir (top) -->
  <rect x="90" y="15" width="80" height="45" rx="5" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Reservoir cap -->
  <rect x="95" y="10" width="70" height="10" rx="3" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Sight glass -->
  <circle cx="130" cy="42" r="8" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Fluid level -->
  <line x1="124" y1="46" x2="136" y2="46" stroke="#333333" stroke-width="0.8" stroke-dasharray="2,1"/>
  <!-- Master cylinder body -->
  <rect x="100" y="60" width="120" height="40" rx="5" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Piston (inside) -->
  <rect x="140" y="65" width="30" height="30" rx="2" fill="none" stroke="#333333" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Piston rod -->
  <line x1="170" y1="80" x2="220" y2="80" stroke="#333333" stroke-width="1.5"/>
  <!-- Push rod and lever connection -->
  <circle cx="224" cy="80" r="4" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Brake line port (output) -->
  <rect x="95" y="72" width="10" height="16" rx="2" fill="none" stroke="#333333" stroke-width="1.5"/>
  <line x1="95" y1="80" x2="70" y2="80" stroke="#333333" stroke-width="1.5"/>
  <text x="55" y="83" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">To caliper</text>
  <!-- Return spring (inside) -->
  <path d="M115,72 L125,78 L115,84 L125,90" stroke="#333333" stroke-width="0.8" fill="none"/>
  <!-- Reservoir to bore connection -->
  <line x1="120" y1="60" x2="120" y2="65" stroke="#333333" stroke-width="1"/>
  <line x1="140" y1="60" x2="140" y2="65" stroke="#333333" stroke-width="1"/>
  <!-- Mounting bracket -->
  <path d="M180,100 L180,130 L250,130 L250,100" fill="none" stroke="#333333" stroke-width="1.5"/>
  <circle cx="200" cy="120" r="5" fill="none" stroke="#333333" stroke-width="1"/>
  <circle cx="230" cy="120" r="5" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Lever pivot -->
  <line x1="228" y1="80" x2="270" y2="50" stroke="#333333" stroke-width="2"/>
  <line x1="270" y1="50" x2="280" y2="48" stroke="#333333" stroke-width="2"/>
  <!-- Callouts -->
  <line x1="170" y1="42" x2="210" y2="30" stroke="#999" stroke-width="0.8"/>
  <text x="212" y="33" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Reservoir</text>
  <line x1="155" y1="80" x2="155" y2="145" stroke="#999" stroke-width="0.8"/>
  <text x="155" y="155" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Piston</text>
  <line x1="265" y1="55" x2="275" y2="40" stroke="#999" stroke-width="0.8"/>
  <text x="270" y="35" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Lever</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Master Cylinder</text>
</svg>