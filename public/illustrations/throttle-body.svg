<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Throttle body outer -->
  <rect x="80" y="40" width="140" height="90" rx="6" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Bore (circular opening) -->
  <ellipse cx="150" cy="85" rx="50" ry="35" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Butterfly valve (partially open) -->
  <line x1="110" y1="100" x2="190" y2="70" stroke="#333333" stroke-width="2.5"/>
  <!-- Butterfly pivot shaft -->
  <circle cx="150" cy="85" r="4" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Shaft extending through body -->
  <line x1="80" y1="85" x2="100" y2="85" stroke="#333333" stroke-width="1.5"/>
  <line x1="200" y1="85" x2="220" y2="85" stroke="#333333" stroke-width="1.5"/>
  <!-- TPS sensor (right side) -->
  <rect x="220" y="75" width="20" height="20" rx="3" fill="none" stroke="#333333" stroke-width="1.5"/>
  <text x="230" y="88" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="7" fill="#666">TPS</text>
  <!-- Injector boss (top) -->
  <rect x="138" y="25" width="24" height="18" rx="2" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Air intake flange (left) -->
  <path d="M60,35 L80,35 L80,130 L60,130" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Mounting flange (right) -->
  <path d="M220,35 L240,35 L240,130 L220,130" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Mounting bolt holes -->
  <circle cx="66" cy="45" r="4" fill="none" stroke="#333333" stroke-width="1"/>
  <circle cx="66" cy="120" r="4" fill="none" stroke="#333333" stroke-width="1"/>
  <circle cx="234" cy="45" r="4" fill="none" stroke="#333333" stroke-width="1"/>
  <circle cx="234" cy="120" r="4" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Airflow arrow -->
  <path d="M35,85 L55,85" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#999"/>
    </marker>
  </defs>
  <text x="35" y="78" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">Air</text>
  <!-- Callouts -->
  <line x1="160" y1="80" x2="160" y2="150" stroke="#999" stroke-width="0.8"/>
  <text x="160" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Butterfly valve</text>
  <line x1="150" y1="25" x2="150" y2="15" stroke="#999" stroke-width="0.8"/>
  <text x="150" y="12" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Injector port</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Throttle Body</text>
</svg>