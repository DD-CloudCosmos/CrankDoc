<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Injector body (elongated) -->
  <rect x="135" y="15" width="30" height="155" rx="4" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Electrical connector (top) -->
  <rect x="140" y="8" width="20" height="12" rx="2" fill="none" stroke="#333333" stroke-width="1.5"/>
  <line x1="147" y1="8" x2="147" y2="3" stroke="#333333" stroke-width="1.5"/>
  <line x1="153" y1="8" x2="153" y2="3" stroke="#333333" stroke-width="1.5"/>
  <!-- Solenoid coil area -->
  <rect x="138" y="30" width="24" height="35" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Coil windings (lines) -->
  <line x1="140" y1="38" x2="160" y2="38" stroke="#333333" stroke-width="0.8"/>
  <line x1="140" y1="43" x2="160" y2="43" stroke="#333333" stroke-width="0.8"/>
  <line x1="140" y1="48" x2="160" y2="48" stroke="#333333" stroke-width="0.8"/>
  <line x1="140" y1="53" x2="160" y2="53" stroke="#333333" stroke-width="0.8"/>
  <line x1="140" y1="58" x2="160" y2="58" stroke="#333333" stroke-width="0.8"/>
  <!-- Filter basket -->
  <rect x="142" y="70" width="16" height="12" fill="none" stroke="#333333" stroke-width="1" stroke-dasharray="2,1"/>
  <!-- O-ring seals -->
  <ellipse cx="150" cy="90" rx="16" ry="4" fill="none" stroke="#333333" stroke-width="1.5"/>
  <ellipse cx="150" cy="155" rx="16" ry="4" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Pintle/needle -->
  <line x1="150" y1="100" x2="150" y2="165" stroke="#333333" stroke-width="1.5"/>
  <!-- Nozzle tip -->
  <path d="M143,170 L150,180 L157,170" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Spray pattern -->
  <line x1="147" y1="180" x2="140" y2="192" stroke="#999" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="150" y1="180" x2="150" y2="194" stroke="#999" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="153" y1="180" x2="160" y2="192" stroke="#999" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Callouts -->
  <line x1="167" y1="15" x2="210" y2="10" stroke="#999" stroke-width="0.8"/>
  <text x="212" y="13" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Connector</text>
  <line x1="167" y1="47" x2="210" y2="40" stroke="#999" stroke-width="0.8"/>
  <text x="212" y="43" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Solenoid</text>
  <line x1="167" y1="90" x2="210" y2="90" stroke="#999" stroke-width="0.8"/>
  <text x="212" y="93" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">O-ring seal</text>
  <line x1="167" y1="140" x2="210" y2="140" stroke="#999" stroke-width="0.8"/>
  <text x="212" y="143" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Pintle</text>
  <line x1="157" y1="175" x2="210" y2="175" stroke="#999" stroke-width="0.8"/>
  <text x="212" y="178" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Nozzle</text>
  <!-- Label -->
  <text x="80" y="192" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Fuel Injector</text>
</svg>