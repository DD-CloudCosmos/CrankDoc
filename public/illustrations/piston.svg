<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Piston body -->
  <rect x="100" y="50" width="100" height="90" rx="3" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Piston crown (top) -->
  <path d="M100,50 Q150,40 200,50" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Ring grooves -->
  <line x1="96" y1="62" x2="100" y2="62" stroke="#333333" stroke-width="1.5"/>
  <line x1="200" y1="62" x2="204" y2="62" stroke="#333333" stroke-width="1.5"/>
  <rect x="96" y="58" width="108" height="8" rx="1" fill="none" stroke="#333333" stroke-width="1.5"/>
  <rect x="96" y="70" width="108" height="6" rx="1" fill="none" stroke="#333333" stroke-width="1.5"/>
  <rect x="96" y="80" width="108" height="6" rx="1" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Wrist pin bore -->
  <circle cx="150" cy="120" r="8" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Wrist pin -->
  <line x1="110" y1="120" x2="190" y2="120" stroke="#333333" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Skirt cutaway lines -->
  <path d="M100,140 L100,145 Q150,155 200,145 L200,140" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Callouts -->
  <line x1="210" y1="63" x2="240" y2="45" stroke="#999" stroke-width="0.8"/>
  <text x="242" y="48" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Compression rings</text>
  <line x1="210" y1="83" x2="240" y2="83" stroke="#999" stroke-width="0.8"/>
  <text x="242" y="86" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Oil ring</text>
  <line x1="160" y1="120" x2="80" y2="155" stroke="#999" stroke-width="0.8"/>
  <text x="42" y="162" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Wrist pin</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Piston (Cross-Section)</text>
</svg>