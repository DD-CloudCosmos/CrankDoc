<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Brake disc (partial, viewed from front/side) -->
  <rect x="140" y="30" width="8" height="140" rx="1" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Ventilation slots in disc -->
  <line x1="142" y1="50" x2="146" y2="50" stroke="#333333" stroke-width="0.8"/>
  <line x1="142" y1="70" x2="146" y2="70" stroke="#333333" stroke-width="0.8"/>
  <line x1="142" y1="90" x2="146" y2="90" stroke="#333333" stroke-width="0.8"/>
  <line x1="142" y1="110" x2="146" y2="110" stroke="#333333" stroke-width="0.8"/>
  <line x1="142" y1="130" x2="146" y2="130" stroke="#333333" stroke-width="0.8"/>
  <line x1="142" y1="150" x2="146" y2="150" stroke="#333333" stroke-width="0.8"/>
  <!-- Caliper body (outer half) -->
  <path d="M148,50 L200,40 Q215,40 215,55 L215,145 Q215,160 200,160 L148,150" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Caliper body (inner half) -->
  <path d="M140,50 L90,42 Q75,42 75,55 L75,145 Q75,160 90,158 L140,150" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Outer brake pad -->
  <rect x="148" y="55" width="12" height="90" rx="1" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Inner brake pad -->
  <rect x="128" y="55" width="12" height="90" rx="1" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Pistons (outer) -->
  <rect x="162" y="65" width="20" height="25" rx="3" fill="none" stroke="#333333" stroke-width="1"/>
  <rect x="162" y="110" width="20" height="25" rx="3" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Pistons (inner) -->
  <rect x="105" y="65" width="20" height="25" rx="3" fill="none" stroke="#333333" stroke-width="1"/>
  <rect x="105" y="110" width="20" height="25" rx="3" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Brake line banjo bolt -->
  <circle cx="215" cy="60" r="5" fill="none" stroke="#333333" stroke-width="1.5"/>
  <line x1="220" y1="60" x2="240" y2="50" stroke="#333333" stroke-width="1.5"/>
  <!-- Bleed nipple -->
  <rect x="210" y="140" width="8" height="15" rx="2" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Callouts -->
  <line x1="160" y1="100" x2="242" y2="100" stroke="#999" stroke-width="0.8"/>
  <text x="244" y="103" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Pad</text>
  <line x1="172" y1="77" x2="242" y2="77" stroke="#999" stroke-width="0.8"/>
  <text x="244" y="80" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Piston</text>
  <line x1="144" y1="100" x2="50" y2="100" stroke="#999" stroke-width="0.8"/>
  <text x="35" y="103" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Disc</text>
  <line x1="240" y1="50" x2="260" y2="40" stroke="#999" stroke-width="0.8"/>
  <text x="262" y="43" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Brake line</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Brake Caliper</text>
</svg>