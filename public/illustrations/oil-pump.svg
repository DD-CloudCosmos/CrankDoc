<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#FAFAFA"/>
  <!-- Pump housing (circular) -->
  <circle cx="150" cy="95" r="60" fill="none" stroke="#333333" stroke-width="2"/>
  <!-- Housing inner cavity -->
  <circle cx="150" cy="95" r="50" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Drive gear (larger, left) -->
  <circle cx="135" cy="95" r="25" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Drive gear teeth -->
  <path d="M112,85 L108,82 L108,88" fill="none" stroke="#333333" stroke-width="1"/>
  <path d="M112,105 L108,102 L108,108" fill="none" stroke="#333333" stroke-width="1"/>
  <path d="M118,75 L115,71 L113,77" fill="none" stroke="#333333" stroke-width="1"/>
  <path d="M118,115 L115,119 L113,113" fill="none" stroke="#333333" stroke-width="1"/>
  <path d="M152,72 L155,68 L157,74" fill="none" stroke="#333333" stroke-width="1"/>
  <path d="M152,118 L155,122 L157,116" fill="none" stroke="#333333" stroke-width="1"/>
  <path d="M158,82 L162,79 L162,85" fill="none" stroke="#333333" stroke-width="1"/>
  <path d="M158,108 L162,105 L162,111" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Driven gear (smaller, right) -->
  <circle cx="168" cy="95" r="22" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Drive shaft center -->
  <circle cx="135" cy="95" r="6" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Driven shaft center -->
  <circle cx="168" cy="95" r="5" fill="none" stroke="#333333" stroke-width="1.5"/>
  <!-- Inlet port -->
  <path d="M90,95 L65,95 L65,80 L50,80" fill="none" stroke="#333333" stroke-width="2"/>
  <text x="35" y="83" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">In</text>
  <!-- Outlet port -->
  <path d="M210,95 L235,95 L235,80 L250,80" fill="none" stroke="#333333" stroke-width="2"/>
  <text x="265" y="83" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">Out</text>
  <!-- Flow arrows -->
  <path d="M55,80 L62,80" stroke="#999" stroke-width="1"/>
  <polygon points="62,77 68,80 62,83" fill="#999"/>
  <path d="M250,80 L257,80" stroke="#999" stroke-width="1"/>
  <polygon points="257,77 263,80 257,83" fill="#999"/>
  <!-- Oil trapped between teeth (shaded region) -->
  <path d="M120,88 Q125,95 120,102" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="2,2"/>
  <path d="M180,88 Q185,95 180,102" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Callouts -->
  <line x1="135" y1="70" x2="135" y2="30" stroke="#999" stroke-width="0.8"/>
  <text x="135" y="22" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Drive gear</text>
  <line x1="168" y1="73" x2="200" y2="40" stroke="#999" stroke-width="0.8"/>
  <text x="202" y="38" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Driven gear</text>
  <line x1="190" y1="130" x2="230" y2="150" stroke="#999" stroke-width="0.8"/>
  <text x="232" y="155" font-family="Inter, Arial, sans-serif" font-size="10" fill="#666">Housing</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#666">Oil Pump (Gear Type)</text>
</svg>